<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project — XIAO XING</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@200;300;400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="project-detail-page">
  <script>if (localStorage.getItem("theme") === "light") { document.body.classList.add("light"); }</script>

  <nav id="mainNav">
    <div class="nav-inner">
      <div class="nav-left">
        <a class="logo" href="index.html">XIAO XING</a>
        <div class="theme-toggle">
          <span class="theme-toggle-label" id="themeLabel">Dark</span>
          <label class="theme-switch">
            <input type="checkbox" id="themeToggle">
            <span class="theme-slider"></span>
          </label>
        </div>
      </div>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="creative-technology.html">Creative Technology</a></li>
        <li><a href="visual-illustrations.html">Visual Illustrations</a></li>
        <li><a href="photography-films.html">Photography &amp; Films</a></li>
      </ul>
    </div>
  </nav>

  <main class="detail-main">

    <div class="detail-header reveal">
      <a href="javascript:history.back()" class="back-link">Back</a>
      <span class="detail-breadcrumb" id="breadcrumb"></span>
    </div>

    <div class="detail-title-block reveal">
      <h1 id="proj-title"></h1>
      <div class="detail-meta">
        <span class="detail-year" id="proj-year"></span>
        <span class="detail-cat-label" id="proj-cat"></span>
      </div>
    </div>

    <div class="detail-media" id="proj-media"></div>

    <div id="proj-experience-wrap"></div>

    <div class="detail-body reveal">
      <p class="detail-description" id="proj-description"></p>
      <p class="detail-medium" id="proj-medium"></p>
      <div class="detail-link-wrap">
        <a class="detail-link" id="proj-link" href="#" target="_blank" rel="noopener" style="display:none"></a>
      </div>
    </div>

    <div class="detail-related reveal">
      <h4 class="related-heading">More from this series</h4>
      <div class="related-grid" id="relatedProjects"></div>
    </div>

  </main>

  <script type="module" src="project.js"></script>
  <script>
    const nav = document.getElementById("mainNav");
    window.addEventListener("scroll", () => {
      nav.classList.toggle("scrolled", window.scrollY > 40);
    }, { passive: true });
  </script>
  <script>
    (function () {
      var tt = document.getElementById("themeToggle"), tl = document.getElementById("themeLabel");
      if (tt) {
        tt.checked = localStorage.getItem("theme") === "light";
        if (tl) tl.textContent = tt.checked ? "Light" : "Dark";
        tt.addEventListener("change", function () {
          document.body.classList.toggle("light", tt.checked);
          if (tl) tl.textContent = tt.checked ? "Light" : "Dark";
          localStorage.setItem("theme", tt.checked ? "light" : "dark");
        });
      }
    })();
  </script>
</body>

</html>
